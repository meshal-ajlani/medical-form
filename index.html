<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تسجيل مفاضلة الطب البشري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4fbff;--card:#fff;--accent:#0b6b8f;--muted:#6b7c86}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#eaf7fb,#f4fbff);margin:0;padding:20px;color:#123}
    .container{max-width:900px;margin:20px auto;padding:24px;background:var(--card);border-radius:12px;box-shadow:0 6px 20px rgba(10,30,40,0.06)}
    h1{color:var(--accent);margin:0 0 12px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    input,select,button{padding:10px;border:1px solid #e0eef2;border-radius:8px;width:100%;box-sizing:border-box}
    label{font-size:14px;color:var(--muted);margin-bottom:6px;display:block}
    .col{flex:1 1 200px;min-width:180px}
    .prefs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .note{background:#eef9fb;padding:10px;border-radius:8px;color:var(--muted);margin-top:12px}
    button{background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;padding:10px 14px}
  </style>
</head>
<body>
  <div class="container">
    <h1>تسجيل مفاضلة الطب البشري</h1>
    <form id="studentForm">
      <div class="row">
        <div class="col"><label>الاسم الكامل</label><input id="name" required /></div>
        <div class="col"><label>الرقم الامتحاني</label><input id="examNo" required /></div>
        <div class="col"><label>المعدل</label><input id="score" type="number" step="0.01" required /></div>
        <div class="col">
          <label>نوع التخصص</label>
          <select id="type">
            <option value="عام">دراسات عليا عام</option>
            <option value="موازي">دراسات عليا موازي</option>
            <option value="وزارة">وزارة الصحة</option>
          </select>
        </div>
      </div>

      <div style="margin-top:12px">
        <label>الرغبات (حتى 10)</label>
        <div id="prefsContainer" class="prefs"></div>
      </div>

      <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
        <button type="submit">إرسال</button>
        <div id="status" style="color:var(--muted)"></div>
      </div>
      <div class="note">تصميم بسيط. يمكنك تعديل أو حذف التسجيل لاحقاً من واجهة الإدارة.</div>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "PROJECT.firebaseapp.com",
      databaseURL: "https://PROJECT-default-rtdb.firebaseio.com",
      projectId: "PROJECT",
      appId: "APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const specialties = [
      "الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
      "الداخلية الدموية","الداخلية الكلية","الداخلية الرثوية","الداخلية الخمجية","الطب النفسي","العينية",
      "الأذنية","الجلدية","طب الأطفال","النسائية والتوليد","الجراحة العامة","الجراحة العظمية",
      "الجراحة البولية","الجراحة الصدرية","الجراحة العصبية","الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية",
      "جراحة الأطفال","الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
      "الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
    ];

    const prefsContainer = document.getElementById('prefsContainer');
    for (let i=1;i<=10;i++){
      const sel = document.createElement('select');
      sel.id = 'pref'+i;
      const empty = document.createElement('option'); empty.value=''; empty.textContent = `${i} - لا اختيار`;
      sel.appendChild(empty);
      specialties.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
      prefsContainer.appendChild(sel);
    }

    const form = document.getElementById('studentForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      status.textContent = 'جاري الإرسال...';
      const name = document.getElementById('name').value.trim();
      const examNo = document.getElementById('examNo').value.trim();
      const score = parseFloat(document.getElementById('score').value);
      const type = document.getElementById('type').value;
      const prefs = [];
      for (let i=1;i<=10;i++){ const v = document.getElementById('pref'+i).value; if (v) prefs.push(v); }
      if (!name || !examNo || isNaN(score) || prefs.length===0){ status.textContent='تأكد من تعبئة الحقول الأساسية ورغبة واحدة على الأقل.'; return; }

      const studentsRef = ref(db, 'students');
      const newRef = push(studentsRef);
      await set(newRef, { name, examNo, score, type, prefs, createdAt: Date.now() });
      status.textContent = 'تم التسجيل بنجاح.';
      form.reset();
      for (let i=1;i<=10;i++) document.getElementById('pref'+i).value = '';
      setTimeout(()=> status.textContent = '', 3000);
    });
  </script>
</body>
</html>
