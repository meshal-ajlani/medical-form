<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مفاضلة تخصصات الطب البشري</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(to bottom, #e8f5ff, #ffffff);
    padding: 30px;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 520px;
    margin: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    border-top: 6px solid #0a84ff;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 700;
    color: #0a4c8c;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
    color: #333;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #bcd7f0;
    font-size: 15px;
    background: #f9fcff;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border-radius: 8px;
    border: none;
    background: #0a84ff;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
}

#msg {
    margin-top: 15px;
    font-weight: 600;
    color: green;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">
    <h2>مفاضلة تخصصات الطب البشري</h2>

    <label>الاسم الثلاثي</label>
    <input type="text" id="name" required>

    <label>الرقم الامتحاني</label>
    <input type="number" id="exam" required>

    <label>المعدل</label>
    <input type="number" id="grade" min="0" max="100">

    <script>
        const specialties = `
            <option value="">— اختر التخصص —</option>
            <option>الداخلية القلبية</option>
            <option>الداخلية الهضمية</option>
            <option>الداخلية الصدرية</option>
            <option>الداخلية الغدية</option>
            <option>الداخلية العصبية</option>
            <option>الداخلية الدموية</option>
            <option>الداخلية الكلية</option>
            <option>الداخلية الرئوية</option>
            <option>الداخلية الخمجية</option>
            <option>طب الأطفال</option>
            <option>النسائية والتوليد</option>
            <option>الطب النفسي</option>
            <option>العينية</option>
            <option>الأذنية</option>
            <option>الجلدية</option>
            <option>الجراحة العامة</option>
            <option>الجراحة العظمية</option>
            <option>الجراحة البولية</option>
            <option>الجراحة الصدرية</option>
            <option>الجراحة العصبية</option>
            <option>الجراحة التجميلية</option>
            <option>الجراحة القلبية</option>
            <option>جراحة الأوعية</option>
            <option>جراحة الأطفال</option>
            <option>الطب المخبري</option>
            <option>التصوير الطبي والشعاعي</option>
            <option>التشريح المرضي</option>
            <option>طب الأورام</option>
            <option>طب الأسرة</option>
            <option>الطب الشرعي</option>
            <option>طب الطوارئ</option>
            <option>التخدير والإنعاش</option>
            <option>الطب الفيزيائي</option>
            <option>الطب النووي</option>
            <option>المعالجة الشعاعية للأورام</option>
        `;
    </script>

    <div id="choices"></div>

    <button onclick="sendData()">إرسال</button>
    <p id="msg"></p>
</div>

<script>
    const container = document.getElementById("choices");

    for (let i = 1; i <= 10; i++) {
        container.innerHTML += `
            <div class="section-title">الرغبة ${i}</div>

            <label>نوع التخصص</label>
            <select id="type${i}">
                <option value="">— اختر نوع التخصص —</option>
                <option>دراسات عليا - تسجيل عام</option>
                <option>دراسات عليا - تسجيل موازي</option>
                <option>وزارة الصحة</option>
            </select>

            <label>التخصص</label>
            <select id="choice${i}">
                ${specialties}
            </select>
        `;
    }

    function sendData() {
        const name = document.getElementById("name").value.trim();
        const exam = document.getElementById("exam").value.trim();
        const grade = document.getElementById("grade").value;

        if (!name || !exam) {
            alert("يجب تعبئة الاسم والرقم الامتحاني قبل الإرسال");
            return;
        }

        let types = [];
        let choices = [];

        for (let i = 1; i <= 10; i++) {
            types.push(document.getElementById("type" + i).value);
            choices.push(document.getElementById("choice" + i).value);
        }

        let form = new FormData();
        form.append("name", name);
        form.append("exam", exam);
        form.append("grade", grade);
        form.append("types", JSON.stringify(types));
        form.append("choices", JSON.stringify(choices));

        fetch("https://script.google.com/macros/s/AKfycbxhpsGJDvQ6yslQxWXtHJJxnfM0RRkzbbVBammaporypWNqV-YPNS4G8p6JhtfiBVUz/exec", {
            method: "POST",
            body: form
        });

        document.getElementById("msg").innerHTML = "✔ تم إرسال البيانات بنجاح";
    }
</script>

</body>
</html>
