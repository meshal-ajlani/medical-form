<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الطلاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #f4f6fb;
    padding: 20px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0a4c8c;
}
label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #d0d7e2;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    background: #0a84ff;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}
.success {
    margin-top: 15px;
    padding: 10px;
    background: #d1f7d1;
    color: #0a6b0a;
    border-radius: 8px;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="container">
    <h1>تسجيل الطلاب للمفاضلة</h1>

    <label>الاسم الثلاثي</label>
    <input id="name" type="text">

    <label>الرقم الامتحاني</label>
    <input id="exam" type="text">

    <label>المعدل</label>
    <input id="grade" type="number" step="0.01">

    <h3 style="margin-top:20px;color:#0a4c8c;">الرغبات (10 رغبات)</h3>

    <div id="choices"></div>

    <button onclick="saveStudent()">تسجيل الطالب</button>

    <div id="success" class="success">تم تسجيل الطالب بنجاح</div>
</div>

<script>
// نفس قائمة التخصصات الموجودة في admin.html
const specialties = [
    "الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
    "الداخلية الدموية","الداخلية الكلية","الداخلية الرئوية","الداخلية الخمجية",
    "الطب النفسي","العينية","الأذنية","الجلدية",
    "طب الأطفال","النسائية والتوليد",
    "الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
    "الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
    "الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي",
    "طب الأورام","طب الأسرة","الطب الشرعي","طب الطوارئ","التخدير والإنعاش",
    "الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

const seatTypes = [
    "دراسات عليا - تسجيل عام",
    "دراسات عليا - تسجيل موازي",
    "وزارة الصحة"
];

// إنشاء 10 رغبات
function buildChoices() {
    const container = document.getElementById("choices");
    for (let i = 1; i <= 10; i++) {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";

        div.innerHTML = `
            <label>الرغبة ${i}</label>
            <select id="spec${i}">
                <option value="">اختر التخصص</option>
                ${specialties.map(s => `<option value="${s}">${s}</option>`).join("")}
            </select>

            <select id="type${i}" style="margin-top:5px;">
                <option value="">اختر نوع المقعد</option>
                ${seatTypes.map(t => `<option value="${t}">${t}</option>`).join("")}
            </select>
        `;

        container.appendChild(div);
    }
}

buildChoices();

// حفظ الطالب
function saveStudent() {
    const name = document.getElementById("name").value.trim();
    const exam = document.getElementById("exam").value.trim();
    const grade = parseFloat(document.getElementById("grade").value);

    if (!name || !exam || isNaN(grade)) {
        alert("يرجى تعبئة الاسم والرقم الامتحاني والمعدل");
        return;
    }

    const choices = [];
    const types = [];

    for (let i = 1; i <= 10; i++) {
        choices.push(document.getElementById(`spec${i}`).value);
        types.push(document.getElementById(`type${i}`).value);
    }

    const student = { name, exam, grade, choices, types };

    const students = JSON.parse(localStorage.getItem("students") || "[]");
    students.push(student);
    localStorage.setItem("students", JSON.stringify(students));

    document.getElementById("success").style.display = "block";
    setTimeout(() => {
        document.getElementById("success").style.display = "none";
    }, 2000);

    document.getElementById("name").value = "";
    document.getElementById("exam").value = "";
    document.getElementById("grade").value = "";
}
</script>

</body>
</html>
