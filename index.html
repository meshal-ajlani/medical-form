<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نموذج تسجيل الرغبات – الدراسات</title>
    <style>
        body {
            font-family: "Tahoma", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
            color: #1f2933;
        }

        .page-wrapper {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            padding: 24px 28px;
            margin-bottom: 20px;
            border-top: 4px solid #2563eb;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #1d4ed8;
        }

        .card-subtitle {
            font-size: 13px;
            color: #6b7280;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 13px;
            color: #4b5563;
        }

        input, select {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
            background-color: #f9fafb;
        }

        input:focus, select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25);
            background-color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #eff6ff;
            font-size: 13px;
            color: #1f2937;
        }

        tr:nth-child(even) td {
            background-color: #f9fafb;
        }

        .choice-select {
            width: 100%;
        }

        .btn-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-primary {
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .note {
            font-size: 12px;
            color: #6b7280;
            margin-top: 6px;
        }

        .error {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            th, td {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

                            <option value="دراسات عام">دراسات عام</option>

<!-- Firebase App -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<!-- Firebase Database -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // إعداد Firebase (نفس الإعداد اللي اشتغل معك)
    const firebaseConfig = {
        apiKey: "AIzaSyA9PmgtkNuY25DEy6_G30tryB-d4s3l_2g",
        authDomain: "medical-form-80f5a.firebaseapp.com",
        databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "medical-form-80f5a",
        storageBucket: "medical-form-80f5a.firebasestorage.app",
        messagingSenderId: "662141312032",
        appId: "1:662141312032:web:14b50dd58662927952b045",
        measurementId: "G-1GHFZF8QRS"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // قائمة التخصصات
    const specialties = [
        "الداخلية العامة",
        "الداخلية القلبية",
        "الداخلية الهضمية",
        "الداخلية الصدرية",
        "الداخلية الغدية",
        "الداخلية العصبية",
        "الداخلية الدموية",
        "الداخلية الكلوية",
        "الداخلية الرثوية",
        "الداخلية الخمجية",
        "الطب النفسي",
        "العينية",
        "الأذنية",
        "الجلدية",
        "طب الأطفال",
        "النسائية والتوليد",
        "الجراحة العامة",
        "الجراحة العظمية",
        "الجراحة البولية",
        "الجراحة الصدرية",
        "الجراحة العصبية",
        "الجراحة التجميلية",
        "الجراحة القلبية",
        "جراحة الأوعية",
        "جراحة الأطفال",
        "الطب المخبري",
        "التصوير الطبي والشعاعي",
        "التشريح المرضي",
        "طب الأورام",
        "طب الأسرة",
        "الطب الشرعي",
        "طب الطوارئ",
        "التخدير والإنعاش",
        "الطب الفيزيائي",
        "الطب النووي",
        "المعالجة الشعاعية للأورام"
    ];

    // تعبئة قوائم التخصصات + تفعيلها فقط بعد اختيار نوع التخصص
    function initChoices() {
        const specSelects = document.querySelectorAll(".spec-select");
        const typeSelects = document.querySelectorAll(".type-select");

        // تعبئة قائمة التخصصات لكل سطر
        specSelects.forEach(select => {
            specialties.forEach(spec => {
                const opt = document.createElement("option");
                opt.value = spec;
                opt.textContent = spec;
                select.appendChild(opt);
            });
        });

        // ربط نوع التخصص مع تفعيل قائمة التخصص
        typeSelects.forEach(typeSel => {
            typeSel.addEventListener("change", () => {
                const index = typeSel.getAttribute("data-index");
                const specSel = document.getElementById("spec-" + index);

                if (typeSel.value) {
                    specSel.disabled = false;
                } else {
                    specSel.disabled = true;
                    specSel.value = "";
                }
            });
        });
    }

    initChoices();

    function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.style.display = "block";
    }

    function clearError() {
        const box = document.getElementById("errorBox");
        box.textContent = "";
        box.style.display = "none";
    }

    function submitForm() {
        clearError();

        const name = document.getElementById("studentName").value.trim();
        const exam = document.getElementById("examNumber").value.trim();
        const score = document.getElementById("score").value.trim();

        if (!name || !exam || !score) {
            showError("يرجى تعبئة الاسم والرقم الامتحاني والمعدل.");
            return;
        }

        const choices = {};
        let hasAtLeastOneChoice = false;

        for (let i = 1; i <= 10; i++) {
            const typeSel = document.getElementById("type-" + i);
            const specSel = document.getElementById("spec-" + i);

            const typeVal = typeSel.value;
            const specVal = specSel.value;

            // إذا الطالب ما اختار شي في هذا السطر → نتجاهله
            if (!typeVal && !specVal) continue;

            // إذا اختار تخصص بدون نوع التخصص → ممنوع
            if (!typeVal && specVal) {
                showError("في الرغبة رقم " + i + ": لا يمكن اختيار التخصص بدون اختيار نوع التخصص أولاً.");
                return;
            }

            // إذا اختار نوع التخصص بدون تخصص → ممنوع
            if (typeVal && !specVal) {
                showError("في الرغبة رقم " + i + ": يرجى اختيار التخصص بعد اختيار نوع التخصص.");
                return;
            }

            hasAtLeastOneChoice = true;
            choices[i] = {
                specialty: specVal,
                type: typeVal
            };
        }

        if (!hasAtLeastOneChoice) {
            showError("يرجى إدخال رغبة واحدة على الأقل.");
            return;
        }

        db.ref("students/" + exam).set({
            name: name,
            exam: exam,
            score: score,
            choices: choices,
            createdAt: new Date().toISOString()
        }).then(() => {
            alert("تم تسجيل الرغبات بنجاح.");
        }).catch((error) => {
            console.error(error);
            showError("حدث خطأ أثناء الإرسال. يرجى المحاولة مرة أخرى.");
        });
    }
</script>
