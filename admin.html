<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #f4f6fb;
    padding: 20px;
}
.container {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0a4c8c;
    margin-bottom: 25px;
}
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #0a84ff;
    color: white;
    cursor: pointer;
}
.delete-btn {
    background: #d9534f;
}
input {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.section-title {
    margin-top: 30px;
    font-size: 20px;
    color: #0a4c8c;
    font-weight: 700;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
table, th, td {
    border: 1px solid #d0d7e2;
}
th, td {
    padding: 8px;
    text-align: center;
}
#seatsWrapper {
    max-height: 300px;
    overflow-y: scroll;
    border: 1px solid #d0d7e2;
    border-radius: 8px;
    padding: 5px;
}
</style>
</head>

<body>

<div class="container">

    <h1>لوحة الإدارة</h1>

    <!-- أزرار التحكم -->
    <button class="delete-btn" onclick="deleteAllStudents()">حذف جميع الطلاب</button>
    <button onclick="deleteOneStudent()">حذف طالب معيّن</button>
    <button onclick="exportExcel()">تصدير النتائج كـ Excel</button>

    <!-- جدول المقاعد -->
    <div class="section-title">تعديل المقاعد</div>
    <div id="seatsWrapper">
        <table id="seatsTable"></table>
    </div>
    <button onclick="saveSeats()">حفظ المقاعد</button>

    <!-- الحد الأدنى -->
    <div class="section-title">الحد الأدنى</div>
    <table id="minTable">
        <tr>
            <th>التخصص</th>
            <th>الحد الأدنى</th>
        </tr>
    </table>

    <!-- المقبولون حسب كل تخصص -->
    <div class="section-title">المقبولون حسب كل تخصص</div>
    <table id="acceptedBySpec">
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
        </tr>
    </table>

    <!-- الجدول الشامل -->
    <div class="section-title">الجدول الشامل</div>
    <table id="finalTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
        </tr>
    </table>

</div>

<script>

// تحميل المقاعد
function loadSeats() {
    fetch("seats.json")
        .then(r => r.json())
        .then(data => {
            const table = document.getElementById("seatsTable");
            table.innerHTML = `
                <tr>
                    <th>التخصص</th>
                    <th>العام</th>
                    <th>الموازي</th>
                    <th>الصحة</th>
                </tr>
            `;
            Object.keys(data).forEach(spec => {
                table.innerHTML += `
                    <tr>
                        <td>${spec}</td>
                        <td><input id="g_${spec}" value="${data[spec].general}"></td>
                        <td><input id="p_${spec}" value="${data[spec].parallel}"></td>
                        <td><input id="h_${spec}" value="${data[spec].health}"></td>
                    </tr>
                `;
            });
        });
}

// حفظ المقاعد
function saveSeats() {
    const rows = document.querySelectorAll("#seatsTable tr");
    const seats = {};

    rows.forEach((row, i) => {
        if (i === 0) return;
        const spec = row.children[0].innerText;
        seats[spec] = {
            general: Number(row.children[1].children[0].value),
            parallel: Number(row.children[2].children[0].value),
            health: Number(row.children[3].children[0].value)
        };
    });

    fetch("seats.json", {
        method: "PUT",
        body: JSON.stringify(seats)
    });

    alert("تم حفظ المقاعد");
    updateResults();
}

// حذف جميع الطلاب
function deleteAllStudents() {
    if (confirm("هل تريد حذف جميع الطلاب؟")) {
        localStorage.removeItem("students");
        updateResults();
    }
}

// حذف طالب معيّن
function deleteOneStudent() {
    const exam = prompt("أدخل الرقم الامتحاني للطالب:");
    if (!exam) return;

    let students = JSON.parse(localStorage.getItem("students") || "[]");
    students = students.filter(s => s.exam !== exam);

    localStorage.setItem("students", JSON.stringify(students));
    alert("تم حذف الطالب");
    updateResults();
}

// التوزيع التلقائي
function updateResults() {
    const students = JSON.parse(localStorage.getItem("students") || "[]");

    const accepted = [];
    const minScores = {};
    const acceptedBySpec = {};

    students.forEach(student => {
        for (let i = 0; i < student.choices.length; i++) {
            if (student.choices[i] !== "" && student.types[i] !== "") {
                const spec = student.choices[i];
                const type = student.types[i];

                accepted.push({
                    name: student.name,
                    exam: student.exam,
                    grade: student.grade,
                    specialty: spec,
                    seatType: type
                });

                if (!minScores[spec] || student.grade < minScores[spec]) {
                    minScores[spec] = student.grade;
                }

                if (!acceptedBySpec[spec]) acceptedBySpec[spec] = [];
                acceptedBySpec[spec].push(student);

                break;
            }
        }
    });

    fillMin(minScores);
    fillAcceptedBySpec(acceptedBySpec);
    fillFinal(accepted);
}

// الحد الأدنى
function fillMin(minScores) {
    const table = document.getElementById("minTable");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>الحد الأدنى</th>
        </tr>
    `;
    Object.keys(minScores).forEach(spec => {
        table.innerHTML += `
            <tr>
                <td>${spec}</td>
                <td>${minScores[spec]}</td>
            </tr>
        `;
    });
}

// المقبولون حسب كل تخصص
function fillAcceptedBySpec(data) {
    const table = document.getElementById("acceptedBySpec");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
        </tr>
    `;
    Object.keys(data).forEach(spec => {
        data[spec].forEach(s => {
            table.innerHTML += `
                <tr>
                    <td>${spec}</td>
                    <td>${s.name}</td>
                    <td>${s.exam}</td>
                    <td>${s.grade}</td>
                    <td>${s.types[0]}</td>
                </tr>
            `;
        });
    });
}

// الجدول الشامل
function fillFinal(list) {
    const table = document.getElementById("finalTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
        </tr>
    `;
    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.specialty}</td>
                <td>${s.seatType}</td>
            </tr>
        `;
    });
}

// تصدير Excel
function exportExcel() {
    const table = document.getElementById("finalTable").outerHTML;
    const blob = new Blob([table], { type: "application/vnd.ms-excel" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "results.xls";
    a.click();
}

loadSeats();
updateResults();

</script>

</body>
</html>
