<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* خلفية عامة بطابع طبي */
body {
    font-family: "Tajawal", sans-serif;
    background: linear-gradient(135deg, #e8f5f7 0%, #f4fbfc 100%);
    padding: 25px;
}

/* صندوق المحتوى */
.container {
    max-width: 1250px;
    margin: auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 18px;
    border: 1px solid #d7e8ea;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

/* العنوان */
h1 {
    text-align: center;
    color: #0a6fae;
    margin-bottom: 30px;
    font-weight: 800;
    letter-spacing: 1px;
}

/* الأزرار */
button {
    padding: 12px 20px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #0a6fae;
    color: white;
    cursor: pointer;
    font-size: 15px;
    transition: 0.25s;
    font-weight: 600;
}
button:hover {
    background: #095e94;
    transform: translateY(-2px);
}

/* زر الحذف */
.delete-btn {
    background: #d9534f;
}
.delete-btn:hover {
    background: #b84441;
}

/* الحقول */
input {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #bcd4d7;
    width: 100%;
    transition: 0.2s;
}
input:focus {
    border-color: #0a6fae;
    box-shadow: 0 0 5px rgba(10,111,174,0.3);
}

/* عناوين الأقسام */
.section-title {
    margin-top: 35px;
    font-size: 22px;
    color: #0a6fae;
    font-weight: 800;
    border-right: 6px solid #0a6fae;
    padding-right: 12px;
    margin-bottom: 10px;
}

/* الجداول */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
}

/* رؤوس الجداول */
th {
    background: #dff3f6;
    color: #0a6fae;
    font-weight: 700;
    padding: 12px;
    font-size: 15px;
    border-bottom: 2px solid #cfe3e6;
}

/* خلايا الجداول */
td {
    padding: 10px;
    background: #ffffff;
    border-bottom: 1px solid #e6f2f4;
    font-size: 14px;
}

/* صفوف متناوبة */
tr:nth-child(even) td {
    background: #f7fcfd;
}

/* صندوق المقاعد */
#seatsWrapper {
    max-height: 300px;
    overflow-y: scroll;
    border: 1px solid #cfe3e6;
    border-radius: 12px;
    padding: 5px;
    background: #f7fcfd;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
}

/* تحسين شريط التمرير */
#seatsWrapper::-webkit-scrollbar {
    width: 8px;
}
#seatsWrapper::-webkit-scrollbar-thumb {
    background: #0a6fae;
    border-radius: 10px;
}
#seatsWrapper::-webkit-scrollbar-track {
    background: #e3f2f4;
}
</style>
</head>

<body>

<div class="container">

    <h1>لوحة الإدارة</h1>

    <button class="delete-btn" onclick="deleteAllStudents()">حذف جميع الطلاب</button>
    <button onclick="deleteOneStudent()">حذف طالب معيّن</button>
    <button onclick="exportExcel()">تصدير النتائج كـ Excel</button>

    <div class="section-title">تعديل المقاعد</div>
    <div id="seatsWrapper">
        <table id="seatsTable"></table>
    </div>
    <button onclick="saveSeats()">حفظ المقاعد</button>

    <div class="section-title">الحد الأدنى</div>
    <table id="minTable">
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    </table>

    <div class="section-title">المقبولون حسب كل تخصص</div>
    <table id="acceptedBySpec">
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    </table>

    <div class="section-title">الجدول الشامل</div>
    <table id="finalTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    </table>

    <div class="section-title">غير المقبولين</div>
    <table id="rejectedTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    </table>

</div>

<script>

// التخصصات
const specialties = [
    "الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
    "الداخلية الدموية","الداخلية الكلية","الداخلية الرئوية","الداخلية الخمجية",
    "الطب النفسي","العينية","الأذنية","الجلدية",
    "طب الأطفال","النسائية والتوليد",
    "الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
    "الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
    "الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي",
    "طب الأورام","طب الأسرة","الطب الشرعي","طب الطوارئ","التخدير والإنعاش",
    "الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

// تحميل المقاعد
function loadSeats() {
    let seats = JSON.parse(localStorage.getItem("seats") || "{}");

    if (Object.keys(seats).length === 0) {
        specialties.forEach(s => {
            seats[s] = { general: 0, parallel: 0, health: 0 };
        });
        localStorage.setItem("seats", JSON.stringify(seats));
    }

    const table = document.getElementById("seatsTable");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    `;

    Object.keys(seats).forEach(spec => {
        table.innerHTML += `
            <tr>
                <td>${spec}</td>
                <td><input id="g_${spec}" value="${seats[spec].general}"></td>
                <td><input id="p_${spec}" value="${seats[spec].parallel}"></td>
                <td><input id="h_${spec}" value="${seats[spec].health}"></td>
            </tr>
        `;
    });
}

// حفظ المقاعد
function saveSeats() {
    const rows = document.querySelectorAll("#seatsTable tr");
    const seats = {};

    rows.forEach((row, i) => {
        if (i === 0) return;
        const spec = row.children[0].innerText;
        seats[spec] = {
            general: Number(row.children[1].children[0].value),
            parallel: Number(row.children[2].children[0].value),
            health: Number(row.children[3].children[0].value)
        };
    });

    localStorage.setItem("seats", JSON.stringify(seats));
    alert("تم حفظ المقاعد");
    updateResults();
}

// حذف جميع الطلاب
function deleteAllStudents() {
    if (confirm("هل تريد حذف جميع الطلاب؟")) {
        localStorage.removeItem("students");
        updateResults();
    }
}

// حذف طالب معيّن
function deleteOneStudent() {
    const exam = prompt("أدخل الرقم الامتحاني للطالب:");
    if (!exam) return;

    let students = JSON.parse(localStorage.getItem("students") || "[]");
    students = students.filter(s => s.exam !== exam);

    localStorage.setItem("students", JSON.stringify(students));
    alert("تم حذف الطالب");
    updateResults();
}

// تحويل نوع المقعد
function typeMap(type) {
    if (type.includes("عام")) return "general";
    if (type.includes("موازي")) return "parallel";
    return "health";
}

// التوزيع النهائي الصحيح
function updateResults() {
    const students = JSON.parse(localStorage.getItem("students") || "[]");
    const seatsOriginal = JSON.parse(localStorage.getItem("seats") || "{}");

    const seats = JSON.parse(JSON.stringify(seatsOriginal));

    const accepted = [];
    const rejected = [];
    const minScores = {};

    // ترتيب الطلاب حسب المعدل
    students.sort((a, b) => b.grade - a.grade);

    students.forEach(student => {
        let assigned = false;

        for (let i = 0; i < student.choices.length; i++) {
            const spec = student.choices[i];
            const type = student.types[i];

            if (!spec || !type) continue;

            const seatKey = typeMap(type);

            if (seats[spec][seatKey] > 0) {
                seats[spec][seatKey]--;

                accepted.push({
                    name: student.name,
                    exam: student.exam,
                    grade: student.grade,
                    specialty: spec,
                    seatType: type,
                    choiceNumber: i + 1
                });

                if (!minScores[spec])
                    minScores[spec] = { general: "-", parallel: "-", health: "-" };

                minScores[spec][seatKey] = student.grade;

                assigned = true;
                break;
            }
        }

        if (!assigned) {
            rejected.push({
                name: student.name,
                exam: student.exam,
                grade: student.grade,
                reason: "لم يحصل على أي رغبة"
            });
        }
    });

    fillMin(minScores);
    fillAcceptedBySpec(accepted);
    fillFinal(accepted);
    fillRejected(rejected);
}

// الحد الأدنى
function fillMin(minScores) {
    const table = document.getElementById("minTable");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    `;

    Object.keys(minScores).forEach(spec => {
        table.innerHTML += `
            <tr>
                <td>${spec}</td>
                <td>${minScores[spec].general}</td>
                <td>${minScores[spec].parallel}</td>
                <td>${minScores[spec].health}</td>
            </tr>
        `;
    });
}

// المقبولون حسب التخصص
function fillAcceptedBySpec(list) {
    const table = document.getElementById("acceptedBySpec");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.specialty}</td>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.seatType}</td>
                <td>${s.choiceNumber}</td>
            </tr>
        `;
    });
}

// الجدول الشامل
function fillFinal(list) {
    const table = document.getElementById("finalTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.specialty}</td>
                <td>${s.seatType}</td>
                <td>${s.choiceNumber}</td>
            </tr>
        `;
    });
}

// غير المقبولين
function fillRejected(list) {
    const table = document.getElementById("rejectedTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.reason}</td>
            </tr>
        `;
    });
}

// تصدير Excel (يدعم العربي)
function exportExcel() {
    const table = document.getElementById("finalTable").outerHTML;
    const utf8Bom = "\uFEFF";
    const blob = new Blob([utf8Bom + table], {
        type: "application/vnd.ms-excel;charset=utf-8"
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "results.xls";
    a.click();
}

loadSeats();
updateResults();

</script>

</body>
</html>
