<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #f4f6fb;
    padding: 20px;
}
.container {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0a4c8c;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
table, th, td {
    border: 1px solid #d0d7e2;
}
th, td {
    padding: 8px;
    text-align: center;
}
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #0a84ff;
    color: white;
    cursor: pointer;
}
.delete-btn {
    background: #d9534f;
}
input {
    padding: 8px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.section-title {
    margin-top: 30px;
    font-size: 20px;
    color: #0a4c8c;
    font-weight: 700;
}
</style>
</head>
<body>

<div class="container">
    <h1>لوحة الإدارة</h1>

    <!-- أزرار التحكم -->
    <button onclick="runDistribution()">تشغيل التوزيع</button>
    <button class="delete-btn" onclick="deleteAllStudents()">حذف جميع الطلاب</button>

    <br><br>

    <!-- مربع البحث -->
    <input id="searchBox" type="text" placeholder="ابحث عن طالب بالاسم أو الرقم" oninput="searchStudents()">

    <!-- جدول المقاعد (كما كان تمامًا) -->
    <div class="section-title">تعديل المقاعد</div>
    <table id="seatsTable"></table>
    <button onclick="saveSeats()">حفظ المقاعد</button>

    <!-- الحد الأدنى -->
    <div class="section-title">الحد الأدنى</div>
    <table id="minTable">
        <tr>
            <th>التخصص</th>
            <th>الحد الأدنى</th>
        </tr>
    </table>

    <!-- المقبولون حسب كل تخصص -->
    <div class="section-title">المقبولون حسب كل تخصص</div>
    <table id="acceptedBySpec">
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
        </tr>
    </table>

    <!-- غير المقبولين -->
    <div class="section-title">غير المقبولين</div>
    <table id="rejectedTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    </table>

    <!-- الجدول الشامل -->
    <div class="section-title">الجدول الشامل</div>
    <table id="finalTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
        </tr>
    </table>

</div>

<script>

// قراءة الطلاب
function getStudents() {
    return JSON.parse(localStorage.getItem("students") || "[]");
}

// حذف جميع الطلاب
function deleteAllStudents() {
    if (confirm("هل أنت متأكد من حذف جميع الطلاب؟")) {
        localStorage.removeItem("students");
        alert("تم حذف جميع الطلاب");
        location.reload();
    }
}

// تشغيل التوزيع
function runDistribution() {
    const students = getStudents();

    const accepted = [];
    const rejected = [];

    students.forEach(student => {
        let assigned = false;

        for (let i = 0; i < student.choices.length; i++) {
            if (student.choices[i] !== "" && student.types[i] !== "") {
                accepted.push({
                    name: student.name,
                    exam: student.exam,
                    grade: student.grade,
                    specialty: student.choices[i],
                    seatType: student.types[i]
                });
                assigned = true;
                break;
            }
        }

        if (!assigned) {
            rejected.push({
                name: student.name,
                exam: student.exam,
                grade: student.grade,
                reason: "لا يوجد رغبات صالحة"
            });
        }
    });

    fillAcceptedBySpec(accepted);
    fillFinal(accepted);
    fillRejected(rejected);
}

// المقبولون حسب كل تخصص
function fillAcceptedBySpec(list) {
    const table = document.getElementById("acceptedBySpec");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>نوع المقعد</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.specialty}</td>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.seatType}</td>
            </tr>
        `;
    });
}

// الجدول الشامل
function fillFinal(list) {
    const table = document.getElementById("finalTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.specialty}</td>
                <td>${s.seatType}</td>
            </tr>
        `;
    });
}

// غير المقبولين
function fillRejected(list) {
    const table = document.getElementById("rejectedTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.reason}</td>
            </tr>
        `;
    });
}

// البحث
function searchStudents() {
    const text = document.getElementById("searchBox").value.trim();
    const students = getStudents();

    const accepted = [];
    const rejected = [];

    students.forEach(student => {
        const match = student.name.includes(text) || student.exam.includes(text);

        if (match) {
            let assigned = false;

            for (let i = 0; i < student.choices.length; i++) {
                if (student.choices[i] !== "" && student.types[i] !== "") {
                    accepted.push({
                        name: student.name,
                        exam: student.exam,
                        grade: student.grade,
                        specialty: student.choices[i],
                        seatType: student.types[i]
                    });
                    assigned = true;
                    break;
                }
            }

            if (!assigned) {
                rejected.push({
                    name: student.name,
                    exam: student.exam,
                    grade: student.grade,
                    reason: "لا يوجد رغبات صالحة"
                });
            }
        }
    });

    fillAcceptedBySpec(accepted);
    fillFinal(accepted);
    fillRejected(rejected);
}

</script>

</body>
</html>
