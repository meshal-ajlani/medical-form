<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة – نظام القبول</title>
<style>
body {
    font-family: Tahoma;
    background: #f4f7fb;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 1200px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
h2 {
    color: #1d4ed8;
    margin-bottom: 10px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}
th {
    background: #e8f0fe;
}
input, select {
    padding: 6px;
    width: 100%;
}
button {
    padding: 10px 20px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #1d4ed8;
}
.section {
    margin-bottom: 30px;
}
</style>
</head>
<body>

<div class="container">

<h2>إدارة المقاعد</h2>
<div class="section">
<table id="seatsTable">
<tr>
    <th>التخصص</th>
    <th>عدد المقاعد</th>
</tr>
</table>
<button onclick="saveSeats()">حفظ المقاعد</button>
</div>

<h2>الطلاب المسجلون</h2>
<div class="section">
<table id="studentsTable">
<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>المعدل</th>
    <th>الرغبات</th>
    <th>حذف</th>
</tr>
</table>
<button onclick="deleteAllStudents()">حذف جميع الطلاب</button>
</div>

<h2>تنفيذ القبول</h2>
<div class="section">
<button onclick="runAcceptance()">تنفيذ القبول</button>
<button onclick="deleteResults()">حذف النتائج</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA9PmgtkNuY25DEy6_G30tryB-d4s3l_2g",
    authDomain: "medical-form-80f5a.firebaseapp.com",
    databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "medical-form-80f5a",
    storageBucket: "medical-form-80f5a.firebasestorage.app",
    messagingSenderId: "662141312032",
    appId: "1:662141312032:web:14b50dd58662927952b045"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const specialties = [
"الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية",
"الداخلية العصبية","الداخلية الدموية","الداخلية الكلوية","الداخلية الرثوية","الداخلية الخمجية",
"الطب النفسي","العينية","الأذنية","الجلدية","طب الأطفال","النسائية والتوليد",
"الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
"الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
"الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
"الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

// تحميل جدول المقاعد
function loadSeats() {
    const table = document.getElementById("seatsTable");
    specialties.forEach(spec => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${spec}</td>
            <td><input id="seat-${spec}" type="number" min="0"></td>
        `;
        table.appendChild(row);
    });

    db.ref("seats").once("value", snap => {
        const data = snap.val() || {};
        Object.keys(data).forEach(spec => {
            document.getElementById("seat-" + spec).value = data[spec];
        });
    });
}

// حفظ المقاعد
function saveSeats() {
    const seats = {};
    specialties.forEach(spec => {
        seats[spec] = Number(document.getElementById("seat-" + spec).value || 0);
    });
    db.ref("seats").set(seats);
    alert("تم حفظ المقاعد");
}

// تحميل الطلاب
function loadStudents() {
    db.ref("students").on("value", snap => {
        const table = document.getElementById("studentsTable");
        table.innerHTML = `
            <tr>
                <th>الاسم</th>
                <th>الرقم</th>
                <th>المعدل</th>
                <th>الرغبات</th>
                <th>حذف</th>
            </tr>
        `;
        snap.forEach(s => {
            const st = s.val();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${st.name}</td>
                <td>${st.exam}</td>
                <td>${st.score}</td>
                <td>${JSON.stringify(st.choices)}</td>
                <td><button onclick="deleteStudent('${st.exam}')">حذف</button></td>
            `;
            table.appendChild(row);
        });
    });
}

function deleteStudent(exam) {
    db.ref("students/" + exam).remove();
}

function deleteAllStudents() {
    if (confirm("هل أنت متأكد؟")) {
        db.ref("students").remove();
    }
}

function deleteResults() {
    db.ref("results").remove();
    alert("تم حذف النتائج");
}

// تنفيذ القبول
async function runAcceptance() {
    const seatsSnap = await db.ref("seats").once("value");
    const seats = seatsSnap.val() || {};

    const studentsSnap = await db.ref("students").once("value");
    const students = [];

    studentsSnap.forEach(s => students.push(s.val()));

    students.sort((a,b) => b.score - a.score);

    const results = {};

    students.forEach(st => {
        let accepted = false;

        for (let i = 1; i <= 10; i++) {
            if (!st.choices[i]) continue;

            const spec = st.choices[i].specialty;
            const type = st.choices[i].type;

            if (seats[spec] > 0) {
                seats[spec]--;
                results[st.exam] = {
                    accepted: true,
                    specialty: spec,
                    type: type,
                    choiceNumber: i,
                    score: st.score
                };
                accepted = true;
                break;
            }
        }

        if (!accepted) {
            results[st.exam] = {
                accepted: false,
                score: st.score
            };
        }
    });

    await db.ref("results").set(results);
    await db.ref("seats").set(seats);

    alert("تم تنفيذ القبول");
}

loadSeats();
loadStudents();
</script>

</body>
</html>
