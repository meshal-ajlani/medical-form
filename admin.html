<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>

<style>
    body {
        font-family: "Cairo", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        margin-bottom: 30px;
    }
    .section-title {
        font-size: 22px;
        margin: 25px 0 10px;
        font-weight: bold;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-bottom: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }
    th {
        background: #007bff;
        color: white;
    }
    input {
        width: 70px;
        padding: 5px;
        text-align: center;
    }
    button {
        padding: 8px 15px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #0056b3;
    }
    .scroll-box {
        max-height: 350px;
        overflow-y: scroll;
        border: 2px solid #ccc;
        background: white;
        margin-bottom: 20px;
    }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD1p3vXx5p4Yp6qz0l4ZlqVvYqYp6qz0l4",
    authDomain: "medical-form2025.firebaseapp.com",
    databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "medical-form2025",
    storageBucket: "medical-form2025.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef123456"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>
</head>

<body>

<h1>لوحة الإدارة</h1>

<!-- ===================== جدول المقاعد ===================== -->
<div class="section-title">تعديل المقاعد</div>

<div class="scroll-box">
<table id="seatsTable">
    <tr>
        <th>التخصص</th>
        <th>عام</th>
        <th>موازي</th>
        <th>صحة</th>
        <th>حفظ</th>
    </tr>
</table>
</div>

<button onclick="saveAllSeats()">حفظ جميع المقاعد</button>


<!-- ===================== جدول المقبولين ===================== -->
<div class="section-title">المقبولون</div>
<div class="scroll-box">
<table id="acceptedTable">
    <tr>
        <th>الاسم</th>
        <th>العلامة</th>
        <th>الاختصاص</th>
        <th>نوع التسجيل</th>
    </tr>
</table>
</div>

<!-- ===================== جدول المرفوضين ===================== -->
<div class="section-title">المرفوضون</div>
<div class="scroll-box">
<table id="rejectedTable">
    <tr>
        <th>الاسم</th>
        <th>العلامة</th>
        <th>الحالة</th>
    </tr>
</table>
</div>

<!-- ===================== جدول الحد الأدنى ===================== -->
<div class="section-title">الحد الأدنى لكل اختصاص</div>
<div class="scroll-box">
<table id="minTable">
    <tr>
        <th>الاختصاص</th>
        <th>الحد الأدنى</th>
    </tr>
</table>
</div>


<script>

// ================= تحميل التخصصات =================
function loadSpecialties() {
    db.ref("/").once("value", snapshot => {
        const data = snapshot.val();
        const table = document.getElementById("seatsTable");

        for (let key in data) {
            if (
                typeof data[key] === "object" &&
                data[key].hasOwnProperty("عام")
            ) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${key}</td>
                    <td><input id="${key}-عام" type="number" value="${data[key].عام}"></td>
                    <td><input id="${key}-موازي" type="number" value="${data[key].موازي}"></td>
                    <td><input id="${key}-صحة" type="number" value="${data[key].صحة}"></td>
                    <td><button onclick="saveSeat('${key}')">حفظ</button></td>
                `;

                table.appendChild(row);
            }
        }
    });
}


// ================= حفظ تخصص واحد =================
function saveSeat(name) {
    const a = Number(document.getElementById(`${name}-عام`).value);
    const m = Number(document.getElementById(`${name}-موازي`).value);
    const s = Number(document.getElementById(`${name}-صحة`).value);

    db.ref(name).set({
        "عام": a,
        "موازي": m,
        "صحة": s
    }).then(() => runAcceptance());
}


// ================= حفظ جميع التخصصات =================
function saveAllSeats() {
    db.ref("/").once("value", snapshot => {
        const data = snapshot.val();
        let updates = {};

        for (let key in data) {
            if (typeof data[key] === "object" && data[key].hasOwnProperty("عام")) {
                updates[key] = {
                    "عام": Number(document.getElementById(`${key}-عام`).value),
                    "موازي": Number(document.getElementById(`${key}-موازي`).value),
                    "صحة": Number(document.getElementById(`${key}-صحة`).value)
                };
            }
        }

        db.ref("/").update(updates).then(() => runAcceptance());
    });
}


// ================= القبول التلقائي =================
function runAcceptance() {
    db.ref("/students").once("value", snap => {
        const students = snap.val() || {};
        let arr = [];

        if (!students || Object.keys(students).length === 0) {
            db.ref("results").set({});
            db.ref("min_scores").set({});
            renderResults({}, {});
            return;
        }

        for (let id in students) {
            arr.push({
                id: id,
                name: students[id].name,
                score: students[id].score,
                type: students[id].type,
                choices: students[id].choices
            });
        }

        arr.sort((a, b) => b.score - a.score);

        db.ref("/").once("value", snapshot => {
            const data = snapshot.val();
            let seats = {};
            let used = {};
            let results = {};
            let minScores = {};

            for (let key in data) {
                if (typeof data[key] === "object" && data[key].hasOwnProperty("عام")) {
                    seats[key] = data[key];
                    used[key] = { "عام": 0, "موازي": 0, "صحة": 0 };
                }
            }

            arr.forEach(st => {
                for (let choice of st.choices) {
                    if (!seats[choice]) continue;

                    let type = st.type;
                    if (used[choice][type] < seats[choice][type]) {
                        used[choice][type]++;
                        results[st.id] = {
                            name: st.name,
                            score: st.score,
                            accepted: choice,
                            type: type
                        };

                        if (!minScores[choice] || st.score < minScores[choice]) {
                            minScores[choice] = st.score;
                        }

                        return;
                    }
                }

                results[st.id] = {
                    name: st.name,
                    score: st.score,
                    accepted: "مرفوض",
                    type: st.type
                };
            });

            db.ref("results").set(results);
            db.ref("min_scores").set(minScores);

            renderResults(results, minScores);
        });
    });
}


// ================= عرض النتائج =================
function renderResults(results, minScores) {
    const acceptedTable = document.getElementById("acceptedTable");
    const rejectedTable = document.getElementById("rejectedTable");
    const minTable = document.getElementById("minTable");

    acceptedTable.innerHTML = `
        <tr><th>الاسم</th><th>العلامة</th><th>الاختصاص</th><th>نوع التسجيل</th></tr>
    `;
    rejectedTable.innerHTML = `
        <tr><th>الاسم</th><th>العلامة</th><th>الحالة</th></tr>
    `;
    minTable.innerHTML = `
        <tr><th>الاختصاص</th><th>الحد الأدنى</th></tr>
    `;

    for (let id in results) {
        let r = results[id];

        if (r.accepted !== "مرفوض") {
            acceptedTable.innerHTML += `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.score}</td>
                    <td>${r.accepted}</td>
                    <td>${r.type}</td>
                </tr>
            `;
        } else {
            rejectedTable.innerHTML += `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.score}</td>
                    <td>مرفوض</td>
                </tr>
            `;
        }
    }

    for (let sp in minScores) {
        minTable.innerHTML += `
            <tr>
                <td>${sp}</td>
                <td>${minScores[sp]}</td>
            </tr>
        `;
    }
}


// تشغيل الصفحة
loadSpecialties();
runAcceptance();

</script>

</body>
</html>
