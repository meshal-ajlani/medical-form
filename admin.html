<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام القبول – نسخة التشخيص</title>
<style>
body { font-family: Tahoma; background: #f4f7fb; margin: 0; padding: 0; }
.container { max-width: 1200px; margin: 30px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
h2 { color: #1d4ed8; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
th { background: #e8f0fe; }
.scroll-box { max-height: 350px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>

<div class="container">

<h2>المقاعد</h2>
<div class="scroll-box">
<table id="seatsTable">
<tr>
    <th>التخصص</th>
    <th>عام</th>
    <th>موازي</th>
    <th>صحة</th>
</tr>
</table>
</div>

<h2>النتائج</h2>
<div class="scroll-box">
<table id="resultsTable">
<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>المعدل</th>
    <th>التخصص</th>
    <th>نوع المقعد</th>
    <th>الرغبة</th>
</tr>
</table>
</div>

<h2>الحد الأدنى</h2>
<div class="scroll-box">
<table id="minTable">
<tr>
    <th>التخصص</th>
    <th>عام</th>
    <th>موازي</th>
    <th>صحة</th>
</tr>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// Firebase
const firebaseConfig = {
    apiKey: "AIzaSyA9PmgtkNuY25DEy6_G30tryB-d4s3l_2g",
    authDomain: "medical-form-80f5a.firebaseapp.com",
    databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "medical-form-80f5a",
    storageBucket: "medical-form-80f5a.firebasestorage.app",
    messagingSenderId: "662141312032",
    appId: "1:662141312032:web:14b50dd58662927952b045"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// قائمة التخصصات
const specialties = [
"الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية",
"الداخلية العصبية","الداخلية الدموية","الداخلية الكلوية","الداخلية الرثوية","الداخلية الخمجية",
"الطب النفسي","العينية","الأذنية","الجلدية","طب الأطفال","النسائية والتوليد",
"الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
"الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
"الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
"الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

// تحويل نوع المقعد
function typeMap(type) {
    if (!type) return null;
    if (type.includes("عام")) return "عام";
    if (type.includes("موازي")) return "موازي";
    if (type.includes("صحة")) return "صحة";
    return null;
}

// تحميل المقاعد
function loadSeats() {
    const table = document.getElementById("seatsTable");

    specialties.forEach(spec => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${spec}</td>
            <td id="seat-${spec}-عام"></td>
            <td id="seat-${spec}-موازي"></td>
            <td id="seat-${spec}-صحة"></td>
        `;
        table.appendChild(row);
    });

    db.ref("seats").once("value", snap => {
        const data = snap.val() || {};
        Object.keys(data).forEach(spec => {
            document.getElementById(`seat-${spec}-عام`).textContent = data[spec].عام;
            document.getElementById(`seat-${spec}-موازي`).textContent = data[spec].موازي;
            document.getElementById(`seat-${spec}-صحة`).textContent = data[spec].صحة;
        });
    });
}

// دالة القبول الجديدة (نسخة التشخيص)
async function runAcceptance() {

    console.clear();
    console.log("🚀 بدء عملية القبول…");

    const seatsSnap = await db.ref("seats").once("value");
    const seats = seatsSnap.val() || {};

    const studentsSnap = await db.ref("students").once("value");
    const students = [];
    studentsSnap.forEach(s => students.push(s.val()));

    console.log("📌 الطلاب:", students);

    // تحويل المعدل إلى رقم
    students.forEach(s => s.score = Number(s.score));

    // ترتيب
    students.sort((a, b) => b.score - a.score);

    console.log("📌 بعد الترتيب:", students);

    const results = {};
    const minScores = {};

    for (const st of students) {

        const examKey = String(st.exam);
        let assigned = false;

        console.log(`\n👤 الطالب: ${st.name} (${st.score})`);

        for (let i = 1; i <= 10; i++) {

            const choice = st.choices?.[i];
            if (!choice) continue;

            const spec = choice.specialty;
            const type = choice.type;
            const seatKey = typeMap(type);

            console.log(`➡ فحص الرغبة ${i}:`, choice);

            if (!spec || !seatKey) continue;
            if (!seats[spec]) continue;
            if (seats[spec][seatKey] === undefined) continue;

            if (seats[spec][seatKey] > 0) {

                seats[spec][seatKey]--;

                results[examKey] = {
                    accepted: true,
                    name: st.name,
                    exam: st.exam,
                    score: st.score,
                    specialty: spec,
                    type: type,
                    choiceNumber: i
                };

                if (!minScores[spec])
                    minScores[spec] = { عام: "—", موازي: "—", صحة: "—" };

                const currentMin = minScores[spec][seatKey];
                if (currentMin === "—" || st.score < currentMin)
                    minScores[spec][seatKey] = st.score;

                console.log(`✅ قبول في ${spec} (${seatKey})`);
                assigned = true;
                break;
            }
        }

        if (!assigned) {
            console.log(`❌ لم يُقبل`);
            results[examKey] = {
                accepted: false,
                name: st.name,
                exam: st.exam,
                score: st.score
            };
        }
    }

    await db.ref("results").set(results);
    await db.ref("min_scores").set(minScores);
    await db.ref("seats_used").set(seats);

    console.log("📌 النتائج النهائية:", results);
    alert("تم تحديث النتائج – راجع Console");
}

// تحميل النتائج
function loadResults() {
    db.ref("results").on("value", snap => {
        const table = document.getElementById("resultsTable");
        table.innerHTML = `
            <tr><th>الاسم</th><th>الرقم</th><th>المعدل</th><th>التخصص</th><th>نوع المقعد</th><th>الرغبة</th></tr>
        `;

        snap.forEach(s => {
            const r = s.val();
            if (!r.accepted) return;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${r.name}</td>
                <td>${r.exam}</td>
                <td>${r.score}</td>
                <td>${r.specialty}</td>
                <td>${r.type}</td>
                <td>${r.choiceNumber}</td>
            `;
            table.appendChild(row);
        });
    });
}

// تحميل الحد الأدنى
function loadMin() {
    db.ref("min_scores").on("value", snap => {
        const table = document.getElementById("minTable");
        table.innerHTML = `
            <tr><th>التخصص</th><th>عام</th><th>موازي</th><th>صحة</th></tr>
        `;
        const data = snap.val() || {};
        specialties.forEach(spec => {
            const m = data[spec] || { عام: "—", موازي: "—", صحة: "—" };
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${spec}</td>
                <td>${m.عام}</td>
                <td>${m.موازي}</td>
                <td>${m.صحة}</td>
            `;
            table.appendChild(row);
        });
    });
}

// تشغيل تلقائي عند فتح الصفحة
loadSeats();
runAcceptance();
loadResults();
loadMin();
</script>

</body>
</html>
