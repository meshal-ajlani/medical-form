<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لوحة الإدارة - مفاضلة الطب البشري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4fbff;--card:#fff;--accent:#0b6b8f;--muted:#6b7c86;--danger:#d9534f}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#eef8fb,#f4fbff);margin:0;padding:18px;color:#123}
    .wrap{max-width:1200px;margin:18px auto}
    .card{background:var(--card);padding:16px;border-radius:12px;box-shadow:0 6px 20px rgba(10,30,40,0.06);margin-bottom:14px}
    h1{color:var(--accent);margin:0 0 8px}
    .small{font-size:13px;color:var(--muted)}
    .spec-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .spec-row .label{flex:1;font-weight:600}
    .spec-row input{width:90px;padding:8px;border-radius:8px;border:1px solid #e6f0f3}
    button{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
    .danger{background:var(--danger)}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .list{max-height:360px;overflow:auto;border:1px solid #eef5f7;padding:10px;border-radius:8px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #eef5f7;text-align:left;font-size:14px}
    .muted{color:var(--muted)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1 1 300px;min-width:220px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة الإدارة - مفاضلة الطب البشري</h1>
      <p class="small">هذا الملف يتصل مباشرة بـ Realtime Database لمشروع Medical-Form2025.</p>
    </div>

    <div class="card">
      <h3>المقاعد حسب التخصص والنوع</h3>
      <div class="small">اضبط المقاعد ثم اضغط حفظ أو شغّل المفاضلة.</div>
      <div id="seatsContainer" class="list" style="margin-top:12px"></div>

      <div class="controls">
        <button id="saveSeatsBtn">حفظ المقاعد</button>
        <button id="runAlgoBtn">تشغيل آلية المفاضلة</button>
        <button id="loadBtn">إعادة تحميل البيانات</button>
        <button id="clearAllBtn" class="danger">حذف جميع الطلاب</button>
      </div>
    </div>

    <div class="card">
      <h3>الحد الأدنى للمعدل لكل تخصص ونوع</h3>
      <div id="minScoresTable" class="list" style="padding:12px"></div>
    </div>

    <div class="card">
      <h3>النتائج</h3>
      <div class="row">
        <div class="col">
          <h4>المقبولون</h4>
          <div id="acceptedList" class="list"></div>
        </div>
        <div class="col">
          <h4>المرفوضون</h4>
          <div id="rejectedList" class="list"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>قائمة الطلاب (قابلة للحذف)</h3>
      <div id="studentsTable" class="list"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // إعدادات Firebase لمشروعك Medical-Form2025
    const firebaseConfig = {
      apiKey: "AIzaSyBKjw37YQewKBNh_Zl9Mnh1gvy37HZiNF0",
      authDomain: "medical-form2025.firebaseapp.com",
      databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "medical-form2025",
      storageBucket: "medical-form2025.appspot.com",
      messagingSenderId: "1088878162837",
      appId: "1:1088878162837:web:d3eea8339ec78cf420fc9c",
      measurementId: "G-QP6PXM5E8P"
    };

    // تهيئة Firebase ومرر databaseURL صراحة
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app");

    // تحقق سريع من الاتصال واطبع النتيجة في Console
    get(ref(db, '/')).then(snap => {
      console.log('RTDB root loaded:', snap.exists() ? 'data exists' : 'empty');
    }).catch(err => {
      console.error('RTDB connection error:', err);
    });

    // التخصصات وأنواع المقاعد
    const specialties = [
      "الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
      "الداخلية الدموية","الداخلية الكلية","الداخلية الرثوية","الداخلية الخمجية","الطب النفسي","العينية",
      "الأذنية","الجلدية","طب الأطفال","النسائية والتوليد","الجراحة العامة","الجراحة العظمية",
      "الجراحة البولية","الجراحة الصدرية","الجراحة العصبية","الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية",
      "جراحة الأطفال","الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
      "الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
    ];
    const types = ["عام","موازي","وزارة"];

    // عناصر DOM
    const seatsContainer = document.getElementById('seatsContainer');
    const saveSeatsBtn = document.getElementById('saveSeatsBtn');
    const runAlgoBtn = document.getElementById('runAlgoBtn');
    const loadBtn = document.getElementById('loadBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const studentsTable = document.getElementById('studentsTable');
    const acceptedList = document.getElementById('acceptedList');
    const rejectedList = document.getElementById('rejectedList');
    const minScoresTable = document.getElementById('minScoresTable');

    // بناء واجهة إدخال المقاعد
    function buildSeatsUI(){
      seatsContainer.innerHTML = '';
      specialties.forEach(spec=>{
        const row = document.createElement('div');
        row.className = 'spec-row';
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = spec;
        row.appendChild(label);

        types.forEach(t=>{
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.min = '0';
          inp.value = '0';
          inp.dataset.spec = spec;
          inp.dataset.type = t;
          inp.title = t;
          row.appendChild(inp);
        });

        seatsContainer.appendChild(row);
      });
    }
    buildSeatsUI();

    // تحميل المقاعد من DB وعرضها
    async function loadSeats(){
      const snap = await get(ref(db, 'seats'));
      const data = snap.exists() ? snap.val() : {};
      document.querySelectorAll('[data-spec]').forEach(inp=>{
        const s = inp.dataset.spec;
        const t = inp.dataset.type;
        inp.value = (data[s] && data[s][t] !== undefined) ? data[s][t] : 0;
      });
    }

    // حفظ المقاعد إلى DB
    saveSeatsBtn.addEventListener('click', async ()=>{
      const seatsObj = {};
      specialties.forEach(s=>{
        seatsObj[s] = {};
        types.forEach(t=>{
          const val = Number(document.querySelector(`[data-spec="${s}"][data-type="${t}"]`).value) || 0;
          seatsObj[s][t] = val;
        });
      });
      await set(ref(db, 'seats'), seatsObj);
      alert('تم حفظ المقاعد.');
    });

    // تحميل وعرض الطلاب
    async function loadStudents(){
      const snap = await get(ref(db, 'students'));
      const data = snap.exists() ? snap.val() : {};
      renderStudentsTable(data);
    }

    function renderStudentsTable(data){
      const rows = Object.entries(data).map(([id, s])=>{
        const prefs = (s.prefs || []).map(p => `${p.specialty} (${p.type})`).join(' ⇢ ');
        return `<tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${escapeHtml(s.examNo || '')}</td>
          <td>${s.score}</td>
          <td>${prefs}</td>
          <td><button data-id="${id}" class="delBtn">حذف</button></td>
        </tr>`;
      }).join('');
      studentsTable.innerHTML = `<table><thead><tr><th>الاسم</th><th>الرقم</th><th>المعدل</th><th>الرغبات</th><th>إجراء</th></tr></thead><tbody>${rows}</tbody></table>`;
      document.querySelectorAll('.delBtn').forEach(b=>{
        b.addEventListener('click', async (e)=>{
          const id = e.target.dataset.id;
          if (!confirm('هل تريد حذف هذا الطالب؟')) return;
          await remove(ref(db, `students/${id}`));
        });
      });
    }

    // حذف جميع الطلاب
    clearAllBtn.addEventListener('click', async ()=>{
      if (!confirm('هل تريد حذف جميع سجلات الطلاب؟ هذا الإجراء لا يمكن التراجع عنه.')) return;
      await remove(ref(db, 'students'));
      await remove(ref(db, 'results'));
      await loadStudents();
      renderResultsEmpty();
      alert('تم حذف جميع الطلاب والنتائج.');
    });

    // تشغيل آلية المفاضلة
    runAlgoBtn.addEventListener('click', async ()=>{
      const seatsSnap = await get(ref(db, 'seats'));
      const seats = seatsSnap.exists() ? seatsSnap.val() : {};
      const studentsSnap = await get(ref(db, 'students'));
      const studentsObj = studentsSnap.exists() ? studentsSnap.val() : {};

      const students = Object.entries(studentsObj).map(([id, s])=> ({ id, ...s }))
        .sort((a,b)=> b.score - a.score);

      const seatsLeft = {};
      specialties.forEach(s=>{
        seatsLeft[s] = {};
        types.forEach(t=> seatsLeft[s][t] = Number((seats[s] && seats[s][t]) ? seats[s][t] : 0));
      });

      const accepted = {};
      const rejected = {};

      for (const stu of students){
        let assigned = null;
        let assignedType = null;
        for (const pref of (stu.prefs || [])){
          const spec = pref.specialty;
          const typ = pref.type;
          if (!spec || !typ) continue;
          if ((seatsLeft[spec] && seatsLeft[spec][typ] > 0)){
            seatsLeft[spec][typ] -= 1;
            assigned = spec;
            assignedType = typ;
            break;
          }
        }
        if (assigned){
          accepted[stu.id] = { ...stu, assigned, assignedType };
        } else {
          rejected[stu.id] = { ...stu };
        }
      }

      const minScores = {};
      specialties.forEach(s=>{
        minScores[s] = {};
        types.forEach(t=>{
          const arr = Object.values(accepted).filter(a => a.assigned === s && a.assignedType === t);
          if (arr.length === 0) minScores[s][t] = null;
          else {
            const min = Math.min(...arr.map(x => Number(x.score)));
            minScores[s][t] = min;
          }
        });
      });

      const resultsPayload = {
        generatedAt: Date.now(),
        seatsLeft,
        accepted,
        rejected,
        minScores
      };
      await set(ref(db, 'results'), resultsPayload);
      alert('انتهت عملية المفاضلة. النتائج محفوظة في /results');
    });

    // عرض النتائج من DB
    async function loadResults(){
      const snap = await get(ref(db, 'results'));
      if (!snap.exists()){ renderResultsEmpty(); return; }
      renderResults(snap.val());
    }

    function renderResultsEmpty(){
      acceptedList.innerHTML = '<div class="small muted">لا توجد نتائج</div>';
      rejectedList.innerHTML = '<div class="small muted">لا توجد نتائج</div>';
      minScoresTable.innerHTML = '<div class="small muted">لا توجد نتائج</div>';
    }

    function renderResults(data){
      const acc = Object.values(data.accepted || {});
      const rej = Object.values(data.rejected || {});

      acceptedList.innerHTML = acc.length ? acc.map(a=>`<div><strong>${escapeHtml(a.name)}</strong> — ${a.score} — ${escapeHtml(a.assigned)} (${escapeHtml(a.assignedType)})</div>`).join('') : '<div class="small muted">لا يوجد مقبولون</div>';
      rejectedList.innerHTML = rej.length ? rej.map(r=>`<div>${escapeHtml(r.name)} — ${r.score}</div>`).join('') : '<div class="small muted">لا يوجد مرفوضون</div>';

      const minScores = data.minScores || {};
      let html = '<table><thead><tr><th>التخصص</th>';
      types.forEach(t=> html += `<th>${t}</th>`);
      html += '</tr></thead><tbody>';
      specialties.forEach(s=>{
        html += `<tr><td>${s}</td>`;
        types.forEach(t=>{
          const v = (minScores[s] && minScores[s][t] !== undefined) ? minScores[s][t] : null;
          html += `<td>${v === null ? '-' : v}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      minScoresTable.innerHTML = html;
    }

    // مراقبة التغييرات الحية
    onValue(ref(db, 'results'), snap => {
      if (snap.exists()) renderResults(snap.val());
      else renderResultsEmpty();
    });
    onValue(ref(db, 'students'), snap => {
      const data = snap.exists() ? snap.val() : {};
      renderStudentsTable(data);
    });
    onValue(ref(db, 'seats'), snap => {
      const data = snap.exists() ? snap.val() : {};
      document.querySelectorAll('[data-spec]').forEach(inp=>{
        const s = inp.dataset.spec; const t = inp.dataset.type;
        inp.value = (data[s] && data[s][t] !== undefined) ? data[s][t] : inp.value;
      });
    });

    // أزرار مساعدة
    loadBtn.addEventListener('click', async ()=>{
      await loadSeats();
      await loadStudents();
      await loadResults();
      alert('تم إعادة تحميل البيانات.');
    });

    // تحميل أولي
    await loadSeats();
    await loadStudents();
    await loadResults();

    function escapeHtml(text){
      if (text === undefined || text === null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
