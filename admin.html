<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
<style>
    body {
        font-family: "Cairo", sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        margin-bottom: 30px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-bottom: 40px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }
    th {
        background: #007bff;
        color: white;
    }
    input {
        width: 70px;
        padding: 5px;
        text-align: center;
    }
    button {
        padding: 8px 15px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #0056b3;
    }
    .section-title {
        font-size: 22px;
        margin: 20px 0 10px;
        font-weight: bold;
    }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD1p3vXx5p4Yp6qz0l4ZlqVvYqYp6qz0l4",
    authDomain: "medical-form2025.firebaseapp.com",
    databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "medical-form2025",
    storageBucket: "medical-form2025.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef123456"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>
</head>
<body>

<h1>لوحة الإدارة</h1>

<div class="section-title">تعديل المقاعد</div>

<table id="seatsTable">
    <tr>
        <th>التخصص</th>
        <th>عام</th>
        <th>موازي</th>
        <th>صحة</th>
        <th>حفظ</th>
    </tr>
</table>

<button onclick="saveAllSeats()">حفظ جميع المقاعد</button>

<script>
// تحميل التخصصات من الجذر مباشرة
function loadSpecialties() {
    db.ref("/").once("value", snapshot => {
        const data = snapshot.val();
        const table = document.getElementById("seatsTable");

        for (let key in data) {
            // نتأكد إنه هذا المفتاح هو تخصص (عام/موازي/صحة)
            if (
                typeof data[key] === "object" &&
                data[key].hasOwnProperty("عام") &&
                data[key].hasOwnProperty("موازي") &&
                data[key].hasOwnProperty("صحة")
            ) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${key}</td>
                    <td><input id="${key}-عام" type="number" value="${data[key].عام}"></td>
                    <td><input id="${key}-موازي" type="number" value="${data[key].موازي}"></td>
                    <td><input id="${key}-صحة" type="number" value="${data[key].صحة}"></td>
                    <td><button onclick="saveSeat('${key}')">حفظ</button></td>
                `;

                table.appendChild(row);
            }
        }
    });
}
// تحميل التخصصات من الجذر مباشرة
function loadSpecialties() {
    db.ref("/").once("value", snapshot => {
        const data = snapshot.val();
        const table = document.getElementById("seatsTable");

        for (let key in data) {
            // نتأكد إنه هذا المفتاح هو تخصص (عام/موازي/صحة)
            if (
                typeof data[key] === "object" &&
                data[key].hasOwnProperty("عام") &&
                data[key].hasOwnProperty("موازي") &&
                data[key].hasOwnProperty("صحة")
            ) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${key}</td>
                    <td><input id="${key}-عام" type="number" value="${data[key].عام}"></td>
                    <td><input id="${key}-موازي" type="number" value="${data[key].موازي}"></td>
                    <td><input id="${key}-صحة" type="number" value="${data[key].صحة}"></td>
                    <td><button onclick="saveSeat('${key}')">حفظ</button></td>
                `;

                table.appendChild(row);
            }
        }
    });
}
// دالة القبول التلقائي
function runAcceptance() {
    db.ref("/students").once("value", snap => {
        const students = snap.val() || {};
        let arr = [];

        // إذا ما في طلاب → فقط حدث الحد الأدنى وارجع
        if (!students || Object.keys(students).length === 0) {
            db.ref("min_scores").set({});
            db.ref("results").set({});
            return;
        }

        // تحويل الطلاب لمصفوفة
        for (let id in students) {
            arr.push({
                id: id,
                name: students[id].name,
                score: students[id].score,
                type: students[id].type, // عام/موازي/صحة
                choices: students[id].choices
            });
        }

        // ترتيب الطلاب حسب العلامة
        arr.sort((a, b) => b.score - a.score);

        // تحميل المقاعد (التخصصات)
        db.ref("/").once("value", snapshot => {
            const data = snapshot.val();
            let seats = {};

            // استخراج التخصصات من الجذر
            for (let key in data) {
                if (
                    typeof data[key] === "object" &&
                    data[key].hasOwnProperty("عام") &&
                    data[key].hasOwnProperty("موازي") &&
                    data[key].hasOwnProperty("صحة")
                ) {
                    seats[key] = {
                        "عام": data[key].عام,
                        "موازي": data[key].موازي,
                        "صحة": data[key].صحة
                    };
                }
            }

            let used = {};       // المقاعد المستخدمة
            let results = {};    // نتائج القبول
            let minScores = {};  // الحد الأدنى

            // تهيئة المقاعد المستخدمة
            for (let sp in seats) {
                used[sp] = { "عام": 0, "موازي": 0, "صحة": 0 };
            }

            // توزيع الطلاب
            arr.forEach(st => {
                for (let choice of st.choices) {
                    if (!seats[choice]) continue;

                    let type = st.type;
                    if (used[choice][type] < seats[choice][type]) {
                        used[choice][type]++;
                        results[st.id] = {
                            name: st.name,
                            score: st.score,
                            accepted: choice,
                            type: type
                        };

                        // تحديث الحد الأدنى
                        if (!minScores[choice] || st.score < minScores[choice]) {
                            minScores[choice] = st.score;
                        }

                        return;
                    }
                }

                // إذا لم يُقبل
                results[st.id] = {
                    name: st.name,
                    score: st.score,
                    accepted: "مرفوض",
                    type: st.type
                };
            });

            // حفظ النتائج
            db.ref("results").set(results);
            db.ref("min_scores").set(minScores);
        });
    });
}

// تشغيل القبول عند فتح الصفحة
loadSpecialties();
runAcceptance();

</script>

</body>
</html>
