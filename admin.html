<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لوحة الإدارة - مفاضلة الطب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7fbfc;--card:#fff;--accent:#0b6b8f;--danger:#d9534f;--muted:#6b7c86}
    body{font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#eef8fb,#f7fbfc);margin:0;padding:20px;color:#123}
    .wrap{max-width:1200px;margin:20px auto}
    .card{background:var(--card);padding:18px;border-radius:12px;box-shadow:0 6px 20px rgba(10,30,40,0.06);margin-bottom:16px}
    h2{color:var(--accent);margin:0 0 10px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    input,select,button{padding:8px;border-radius:8px;border:1px solid #e0eef2}
    button{background:var(--accent);color:#fff;border:none;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid #eef5f7;text-align:left;font-size:14px}
    .list{max-height:320px;overflow:auto;border:1px solid #eef5f7;padding:8px;border-radius:8px}
    .small{font-size:13px;color:var(--muted)}
    .danger{background:var(--danger);color:#fff}
    .spec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .spec-row input{width:90px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>لوحة الإدارة</h2>
      <div class="small">سجل دخول ثم عدّل المقاعد وشغّل آلية المفاضلة.</div>
      <div style="margin-top:10px" class="row">
        <div><label class="small">البريد الإلكتروني</label><input id="adminEmail" /></div>
        <div><label class="small">كلمة المرور</label><input id="adminPass" type="password" /></div>
        <div style="align-self:end">
          <button id="loginBtn">تسجيل دخول</button>
          <button id="logoutBtn" style="display:none;background:#777">تسجيل خروج</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>المقاعد حسب التخصص والنوع</h3>
      <div class="small">اضبط عدد المقاعد لكل تخصص ولكل نوع ثم اضغط حفظ.</div>
      <div id="seatsContainer" class="list" style="margin-top:10px"></div>
      <div style="margin-top:10px">
        <button id="saveSeatsBtn">حفظ المقاعد</button>
        <button id="runAlgoBtn" style="margin-left:8px">تشغيل آلية المفاضلة</button>
        <button id="clearAllBtn" class="danger" style="margin-left:8px">حذف جميع الطلاب</button>
      </div>
    </div>

    <div class="card">
      <h3>الحد الأدنى للمعدل لكل تخصص ونوع (يتحدّث تلقائياً)</h3>
      <div id="minScoresTable" class="list" style="padding:12px"></div>
    </div>

    <div class="card">
      <h3>النتائج</h3>
      <div class="row">
        <div style="flex:1">
          <h4>المقبولون</h4>
          <div id="acceptedList" class="list"></div>
        </div>
        <div style="flex:1">
          <h4>المرفوضون</h4>
          <div id="rejectedList" class="list"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>قائمة الطلاب (قابلة للحذف)</h3>
      <div id="studentsTable"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, child, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "API_KEY",
      authDomain: "PROJECT.firebaseapp.com",
      databaseURL: "https://PROJECT-default-rtdb.firebaseio.com",
      projectId: "PROJECT",
      appId: "APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const specialties = [
      "الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
      "الداخلية الدموية","الداخلية الكلية","الداخلية الرثوية","الداخلية الخمجية","الطب النفسي","العينية",
      "الأذنية","الجلدية","طب الأطفال","النسائية والتوليد","الجراحة العامة","الجراحة العظمية",
      "الجراحة البولية","الجراحة الصدرية","الجراحة العصبية","الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية",
      "جراحة الأطفال","الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
      "الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
    ];
    const types = ["عام","موازي","وزارة"];

    // DOM
    const seatsContainer = document.getElementById('seatsContainer');
    const saveSeatsBtn = document.getElementById('saveSeatsBtn');
    const runAlgoBtn = document.getElementById('runAlgoBtn');
    const acceptedList = document.getElementById('acceptedList');
    const rejectedList = document.getElementById('rejectedList');
    const studentsTable = document.getElementById('studentsTable');
    const minScoresTable = document.getElementById('minScoresTable');
    const clearAllBtn = document.getElementById('clearAllBtn');

    const adminEmail = document.getElementById('adminEmail');
    const adminPass = document.getElementById('adminPass');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // أنشئ واجهة إدخال المقاعد: لكل تخصص ثلاثة حقول
    specialties.forEach(spec=>{
      const wrapper = document.createElement('div');
      wrapper.className = 'spec-row';
      const label = document.createElement('div'); label.textContent = spec; label.style.flex='1';
      const inputs = document.createElement('div'); inputs.style.display='flex'; inputs.style.gap='8px';
      types.forEach(t=>{
        const inp = document.createElement('input');
        inp.type='number'; inp.min='0'; inp.value='0';
        inp.dataset.spec = spec; inp.dataset.type = t;
        inp.title = t;
        inputs.appendChild(inp);
      });
      wrapper.appendChild(label);
      wrapper.appendChild(inputs);
      seatsContainer.appendChild(wrapper);
    });

    // تحميل المقاعد من DB وعرضها
    const seatsRef = ref(db, 'seats');
    onValue(seatsRef, snap=>{
      const data = snap.val() || {};
      document.querySelectorAll('[data-spec]').forEach(inp=>{
        const s = inp.dataset.spec;
        const t = inp.dataset.type;
        inp.value = (data[s] && data[s][t]) ? data[s][t] : 0;
      });
    });

    saveSeatsBtn.addEventListener('click', async ()=>{
      const user = auth.currentUser;
      if (!user){ alert('سجل دخول كأدمن لحفظ المقاعد.'); return; }
      const adminSnap = await get(child(ref(db), `admins/${user.uid}`));
      if (!adminSnap.exists()){ alert('ليس لديك صلاحية أدمن.'); return; }

      const updates = {};
      document.querySelectorAll('[data-spec]').forEach(inp=>{
        const s = inp.dataset.spec; const t = inp.dataset.type;
        updates[`${s}/${t}`] = Number(inp.value) || 0;
      });
      // نعيد بناء كائن المقاعد
      const seatsObj = {};
      specialties.forEach(s=>{
        seatsObj[s] = {};
        types.forEach(t=> seatsObj[s][t] = Number(document.querySelector(`[data-spec="${s}"][data-type="${t}"]`).value) || 0);
      });
      await set(seatsRef, seatsObj);
      alert('تم حفظ المقاعد.');
    });

    // تحميل وعرض الطلاب
    const studentsRef = ref(db, 'students');
    onValue(studentsRef, snap=>{
      const data = snap.val() || {};
      renderStudentsTable(data);
    });

    function renderStudentsTable(data){
      const rows = Object.entries(data).map(([key, s])=>{
        return `<tr>
          <td>${s.name}</td><td>${s.examNo}</td><td>${s.score}</td><td>${s.type}</td>
          <td>${(s.prefs||[]).join(' | ')}</td>
          <td><button data-id="${key}" class="delBtn">حذف</button></td>
        </tr>`;
      }).join('');
      studentsTable.innerHTML = `<table><thead><tr><th>الاسم</th><th>الرقم</th><th>المعدل</th><th>النوع</th><th>الرغبات</th><th>إجراء</th></tr></thead><tbody>${rows}</tbody></table>`;
      document.querySelectorAll('.delBtn').forEach(b=>{
        b.addEventListener('click', async (e)=>{
          const id = e.target.dataset.id;
          if (!confirm('حذف هذا الطالب؟')) return;
          await remove(ref(db, `students/${id}`));
        });
      });
    }

    // حذف جميع الطلاب
    clearAllBtn.addEventListener('click', async ()=>{
      const user = auth.currentUser;
      if (!user){ alert('سجل دخول كأدمن.'); return; }
      const adminSnap = await get(child(ref(db), `admins/${user.uid}`));
      if (!adminSnap.exists()){ alert('ليس لديك صلاحية أدمن.'); return; }
      if (!confirm('هل تريد حذف جميع سجلات الطلاب؟')) return;
      await remove(ref(db, 'students'));
      await remove(ref(db, 'results'));
      alert('تم الحذف.');
    });

    // تشغيل آلية المفاضلة (مفصّلة حسب النوع)
    runAlgoBtn.addEventListener('click', async ()=>{
      const user = auth.currentUser;
      if (!user){ alert('سجل دخول كأدمن.'); return; }
      const adminSnap = await get(child(ref(db), `admins/${user.uid}`));
      if (!adminSnap.exists()){ alert('ليس لديك صلاحية أدمن.'); return; }

      const seatsSnap = await get(seatsRef);
      const seats = seatsSnap.val() || {};
      const studentsSnap = await get(studentsRef);
      const studentsObj = studentsSnap.val() || {};

      // تحويل الطلاب إلى مصفوفة وترتيب تنازلي حسب المعدل
      const students = Object.entries(studentsObj).map(([id, s])=> ({ id, ...s }))
        .sort((a,b)=> b.score - a.score);

      // نسخة من المقاعد قابلة للتعديل
      const seatsLeft = {};
      specialties.forEach(s=>{
        seatsLeft[s] = {};
        types.forEach(t=> seatsLeft[s][t] = Number((seats[s] && seats[s][t]) ? seats[s][t] : 0));
      });

      const accepted = {};
      const rejected = {};

      // لكل نوع نعالج الطلاب الذين اختاروا ذلك النوع فقط
      for (const t of types){
        // فلتر الطلاب من نفس النوع
        const pool = students.filter(st => st.type === t);
        for (const stu of pool){
          let assigned = null;
          for (const pref of (stu.prefs || [])){
            if (!pref) continue;
            if ((seatsLeft[pref] && seatsLeft[pref][t] > 0)){
              seatsLeft[pref][t] -= 1;
              assigned = pref;
              break;
            }
          }
          if (assigned){
            accepted[stu.id] = { ...stu, assigned, type: t };
          } else {
            rejected[stu.id] = { ...stu };
          }
        }
      }

      // حساب الحد الأدنى للمعدل لكل تخصص ولكل نوع
      const minScores = {};
      specialties.forEach(s=>{
        minScores[s] = {};
        types.forEach(t=>{
          // اجمع المقبولين في هذا التخصص والنوع
          const arr = Object.values(accepted).filter(a => a.assigned === s && a.type === t);
          if (arr.length === 0) minScores[s][t] = null;
          else {
            // الحد الأدنى = أقل معدل بين المقبولين في هذا التخصص/نوع
            const min = Math.min(...arr.map(x => Number(x.score)));
            minScores[s][t] = min;
          }
        });
      });

      // حفظ النتائج
      const resultsRef = ref(db, 'results');
      const payload = {
        generatedAt: Date.now(),
        seatsLeft,
        accepted,
        rejected,
        minScores
      };
      await set(resultsRef, payload);
      alert('انتهت عملية المفاضلة. النتائج محفوظة.');
    });

    // عرض النتائج وتحديث جدول الحد الأدنى تلقائياً
    const resultsRef = ref(db, 'results');
    onValue(resultsRef, snap=>{
      const data = snap.val();
      if (!data){ acceptedList.innerHTML = '<div class="small">لا نتائج</div>'; rejectedList.innerHTML = '<div class="small">لا نتائج</div>'; minScoresTable.innerHTML = '<div class="small">لا نتائج</div>'; return; }
      // عرض المقبولين والمرفوضين
      const acc = Object.values(data.accepted || {});
      const rej = Object.values(data.rejected || {});
      acceptedList.innerHTML = acc.length ? acc.map(a=>`<div><strong>${a.name}</strong> — ${a.score} — ${a.assigned} (${a.type})</div>`).join('') : '<div class="small">لا يوجد مقبولون</div>';
      rejectedList.innerHTML = rej.length ? rej.map(r=>`<div>${r.name} — ${r.score} — ${r.type}</div>`).join('') : '<div class="small">لا يوجد مرفوضون</div>';

      // جدول الحد الأدنى
      const minScores = data.minScores || {};
      let html = '<table><thead><tr><th>التخصص</th>';
      types.forEach(t=> html += `<th>${t}</th>`);
      html += '</tr></thead><tbody>';
      specialties.forEach(s=>{
        html += `<tr><td>${s}</td>`;
        types.forEach(t=>{
          const v = (minScores[s] && minScores[s][t] !== undefined) ? minScores[s][t] : null;
          html += `<td>${v === null ? '-' : v}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      minScoresTable.innerHTML = html;
    });

    // تسجيل دخول/خروج (Firebase Auth)
    loginBtn.addEventListener('click', async ()=>{
      const email = adminEmail.value.trim(); const pass = adminPass.value;
      if (!email || !pass){ alert('أدخل البريد وكلمة المرور'); return; }
      try{ await signInWithEmailAndPassword(auth, email, pass); } catch(err){ alert('فشل تسجيل الدخول: ' + err.message); }
    });
    logoutBtn.addEventListener('click', async ()=> { await signOut(auth); });

    onAuthStateChanged(auth, async (user)=>{
      if (user){
        loginBtn.style.display = 'none'; logoutBtn.style.display = 'inline-block';
        // تحقق من وجود uid في /admins
        const adminSnap = await get(child(ref(db), `admins/${user.uid}`));
        if (!adminSnap.exists()){ alert('المستخدم ليس في قائمة الأدمن. أضف uid في /admins ليحصل على صلاحيات.'); }
      } else {
        loginBtn.style.display = 'inline-block'; logoutBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
