<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #eef7fa;
    padding: 20px;
}
.container {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0a6fae;
    margin-bottom: 25px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    border: 1px solid #cfe3e6;
    padding: 10px;
    text-align: center;
}
th {
    background: #dff3f6;
    color: #0a6fae;
}
tr:nth-child(even) td {
    background: #f7fcfd;
}
button {
    padding: 10px 20px;
    background: #0a6fae;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
}
button:hover {
    background: #095e94;
}
.delete-btn {
    background: #d9534f;
}
.delete-btn:hover {
    background: #b84441;
}
</style>
</head>

<body>

<div class="container">

    <h1>لوحة الإدارة</h1>

    <button onclick="updateResults()">تحديث النتائج</button>
    <button class="delete-btn" onclick="deleteAllStudents()">حذف جميع الطلاب</button>

    <h2 style="color:#0a6fae;">الحد الأدنى</h2>
    <table id="minTable">
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    </table>

    <h2 style="color:#0a6fae;">المقبولون</h2>
    <table id="acceptedTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    </table>

    <h2 style="color:#0a6fae;">غير المقبولين</h2>
    <table id="rejectedTable">
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    </table>

</div>

<script>

// قائمة التخصصات كاملة
const specialties = [
    "الداخلية العامة",
    "الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية","الداخلية العصبية",
    "الداخلية الدموية","الداخلية الكلية","الداخلية الرئوية","الداخلية الخمجية",
    "الطب النفسي","العينية","الأذنية","الجلدية",
    "طب الأطفال","النسائية والتوليد",
    "الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
    "الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
    "الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي",
    "طب الأورام","طب الأسرة","الطب الشرعي","طب الطوارئ","التخدير والإنعاش",
    "الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

// تحويل نوع المقعد
function typeMap(type) {
    if (type.includes("عام")) return "general";
    if (type.includes("موازي")) return "parallel";
    return "health";
}

// حذف الطلاب
function deleteAllStudents() {
    if (confirm("هل تريد حذف جميع الطلاب؟")) {
        localStorage.removeItem("students");
        updateResults();
    }
}

// تحديث النتائج
function updateResults() {
    const students = JSON.parse(localStorage.getItem("students") || "[]");

    // ترتيب الطلاب حسب المعدل
    students.sort((a, b) => b.grade - a.grade);

    // المقاعد الافتراضية (يمكنك تعديلها لاحقًا)
    const seats = {};
    specialties.forEach(s => {
        seats[s] = { general: 3, parallel: 3, health: 3 };
    });

    const accepted = [];
    const rejected = [];
    const minScores = {};

    students.forEach(student => {
        let assigned = false;

        for (let i = 0; i < student.choices.length; i++) {
            const spec = student.choices[i];
            const type = student.types[i];

            if (!spec || !type) continue;

            const seatKey = typeMap(type);

            if (seats[spec][seatKey] > 0) {
                seats[spec][seatKey]--;

                accepted.push({
                    name: student.name,
                    exam: student.exam,
                    grade: student.grade,
                    specialty: spec,
                    seatType: type,
                    choiceNumber: i + 1
                });

                if (!minScores[spec])
                    minScores[spec] = { general: "-", parallel: "-", health: "-" };

                minScores[spec][seatKey] = student.grade;

                assigned = true;
                break;
            }
        }

        if (!assigned) {
            rejected.push({
                name: student.name,
                exam: student.exam,
                grade: student.grade,
                reason: "لم يحصل على أي رغبة"
            });
        }
    });

    fillMin(minScores);
    fillAccepted(accepted);
    fillRejected(rejected);

    localStorage.setItem("minScores", JSON.stringify(minScores));
}

// تعبئة الحد الأدنى
function fillMin(minScores) {
    const table = document.getElementById("minTable");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    `;

    Object.keys(minScores).forEach(spec => {
        table.innerHTML += `
            <tr>
                <td>${spec}</td>
                <td>${minScores[spec].general}</td>
                <td>${minScores[spec].parallel}</td>
                <td>${minScores[spec].health}</td>
            </tr>
        `;
    });
}

// المقبولون
function fillAccepted(list) {
    const table = document.getElementById("acceptedTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>التخصص</th>
            <th>نوع المقعد</th>
            <th>رقم الرغبة</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.specialty}</td>
                <td>${s.seatType}</td>
                <td>${s.choiceNumber}</td>
            </tr>
        `;
    });
}

// غير المقبولين
function fillRejected(list) {
    const table = document.getElementById("rejectedTable");
    table.innerHTML = `
        <tr>
            <th>الاسم</th>
            <th>الرقم الامتحاني</th>
            <th>المعدل</th>
            <th>سبب الرفض</th>
        </tr>
    `;

    list.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.name}</td>
                <td>${s.exam}</td>
                <td>${s.grade}</td>
                <td>${s.reason}</td>
            </tr>
        `;
    });
}

updateResults();

</script>

</body>
</html>
