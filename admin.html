<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة – نظام القبول</title>
<style>
body { font-family: Tahoma; background: #f4f7fb; margin: 0; padding: 0; }
#loginBox { max-width: 400px; margin: 120px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); text-align: center; }
#loginBox input { width: 100%; padding: 10px; margin-top: 15px; border-radius: 6px; border: 1px solid #ccc; }
#loginBox button { margin-top: 15px; padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
#loginBox button:hover { background: #1d4ed8; }
#errorMsg { color: red; margin-top: 10px; font-size: 14px; }
#adminPanel { display: none; }
.container { max-width: 1300px; margin: 30px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
h2 { color: #1d4ed8; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
th { background: #e8f0fe; }
input { padding: 6px; width: 100%; }
button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
button:hover { background: #1d4ed8; }
.section { margin-bottom: 30px; }
.scroll-box { max-height: 350px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
#floatingBtn { position: fixed; bottom: 25px; right: 25px; background: #2563eb; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 9999; }
#floatingBtn:hover { background: #1d4ed8; }
</style>
</head>
<body>

<div id="floatingBtn" onclick="runAcceptance()">تحديث النتائج</div>

<div id="loginBox">
    <h2>تسجيل الدخول للوحة الإدارة</h2>
    <input type="password" id="adminPass" placeholder="أدخل كلمة السر">
    <button onclick="checkPassword()">دخول</button>
    <div id="errorMsg"></div>
</div>

<div id="adminPanel">
<div class="container">

<h2>إدارة المقاعد</h2>
<div class="section">
<div class="scroll-box">
<table id="seatsTable">
<tr>
    <th>التخصص</th>
    <th>عام</th>
    <th>موازي</th>
    <th>صحة</th>
</tr>
</table>
</div>
<button onclick="saveSeats()">حفظ المقاعد</button>
</div>

<h2>الطلاب المسجلون</h2>
<div class="section">
<table id="studentsTable">
<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>المعدل</th>
    <th>الرغبات</th>
    <th>حذف</th>
</tr>
</table>
<button onclick="deleteAllStudents()">حذف جميع الطلاب</button>
</div>

<h2>الطلاب المقبولون</h2>
<div class="section">
<div class="scroll-box">
<table id="acceptedTable">
<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>المعدل</th>
    <th>التخصص</th>
    <th>نوع المقعد</th>
    <th>الرغبة</th>
</tr>
</table>
</div>
</div>

<h2>الطلاب المرفوضون</h2>
<div class="section">
<div class="scroll-box">
<table id="rejectedTable">
<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>المعدل</th>
</tr>
</table>
</div>
</div>

<h2>الحد الأدنى</h2>
<div class="section">
<div class="scroll-box">
<table id="minTable">
<tr>
    <th>التخصص</th>
    <th>عام</th>
    <th>موازي</th>
    <th>صحة</th>
</tr>
</table>
</div>
</div>

<button onclick="deleteResults()">حذف النتائج</button>

</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const ADMIN_PASSWORD = "Meshal2025";

function checkPassword() {
    if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        document.getElementById("errorMsg").textContent = "كلمة السر غير صحيحة";
    }
}

const firebaseConfig = {
    apiKey: "AIzaSyA9PmgtkNuY25DEy6_G30tryB-d4s3l_2g",
    authDomain: "medical-form-80f5a.firebaseapp.com",
    databaseURL: "https://medical-form2025-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "medical-form-80f5a",
    storageBucket: "medical-form-80f5a.firebasestorage.app",
    messagingSenderId: "662141312032",
    appId: "1:662141312032:web:14b50dd58662927952b045"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const specialties = [
"الداخلية العامة","الداخلية القلبية","الداخلية الهضمية","الداخلية الصدرية","الداخلية الغدية",
"الداخلية العصبية","الداخلية الدموية","الداخلية الكلوية","الداخلية الرثوية","الداخلية الخمجية",
"الطب النفسي","العينية","الأذنية","الجلدية","طب الأطفال","النسائية والتوليد",
"الجراحة العامة","الجراحة العظمية","الجراحة البولية","الجراحة الصدرية","الجراحة العصبية",
"الجراحة التجميلية","الجراحة القلبية","جراحة الأوعية","جراحة الأطفال",
"الطب المخبري","التصوير الطبي والشعاعي","التشريح المرضي","طب الأورام","طب الأسرة",
"الطب الشرعي","طب الطوارئ","التخدير والإنعاش","الطب الفيزيائي","الطب النووي","المعالجة الشعاعية للأورام"
];

function typeMap(type) {
    if (type.includes("عام")) return "عام";
    if (type.includes("موازي")) return "موازي";
    if (type.includes("صحة")) return "صحة";
    return null;
}

function loadSeats() {
    const table = document.getElementById("seatsTable");
    specialties.forEach(spec => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${spec}</td>
            <td><input id="seat-${spec}-عام" type="number"></td>
            <td><input id="seat-${spec}-موازي" type="number"></td>
            <td><input id="seat-${spec}-صحة" type="number"></td>
        `;
        table.appendChild(row);
    });

    db.ref("seats").once("value", snap => {
        const data = snap.val() || {};
        Object.keys(data).forEach(spec => {
            document.getElementById(`seat-${spec}-عام`).value = data[spec].عام;
            document.getElementById(`seat-${spec}-موازي`).value = data[spec].موازي;
            document.getElementById(`seat-${spec}-صحة`).value = data[spec].صحة;
        });
    });
}

function saveSeats() {
    const seats = {};
    specialties.forEach(spec => {
        seats[spec] = {
            عام: Number(document.getElementById(`seat-${spec}-عام`).value || 0),
            موازي: Number(document.getElementById(`seat-${spec}-موازي`).value || 0),
            صحة: Number(document.getElementById(`seat-${spec}-صحة`).value || 0)
        };
    });
    db.ref("seats").set(seats);
    alert("تم حفظ المقاعد");
}

function loadStudents() {
    db.ref("students").on("value", snap => {
        const table = document.getElementById("studentsTable");
        table.innerHTML = `
            <tr><th>الاسم</th><th>الرقم</th><th>المعدل</th><th>الرغبات</th><th>حذف</th></tr>
        `;
        snap.forEach(s => {
            const st = s.val();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${st.name}</td>
                <td>${st.exam}</td>
                <td>${st.score}</td>
                <td>${JSON.stringify(st.choices)}</td>
                <td><button onclick="deleteStudent('${st.exam}')">حذف</button></td>
            `;
            table.appendChild(row);
        });
    });
}

function deleteStudent(exam) {
    db.ref("students/" + exam).remove();
}

function deleteAllStudents() {
    if (confirm("هل أنت متأكد؟")) db.ref("students").remove();
}

function deleteResults() {
    db.ref("results").remove();
    db.ref("min_scores").remove();
    db.ref("seats_used").remove();
    alert("تم حذف النتائج");
}

function loadAccepted() {
    db.ref("results").on("value", snap => {
        const table = document.getElementById("acceptedTable");
        table.innerHTML = `
            <tr><th>الاسم</th><th>الرقم</th><th>المعدل</th><th>التخصص</th><th>نوع المقعد</th><th>الرغبة</th></tr>
        `;
        snap.forEach(s => {
            const r = s.val();
            if (!r.accepted) return;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${r.name}</td>
                <td>${r.exam}</td>
                <td>${r.score}</td>
                <td>${r.specialty}</td>
                <td>${r.type}</td>
                <td>${r.choiceNumber}</td>
            `;
            table.appendChild(row);
        });
    });
}

function loadRejected() {
    db.ref("results").on("value", snap => {
        const table = document.getElementById("rejectedTable");
        table.innerHTML = `
            <tr><th>الاسم</th><th>الرقم</th><th>المعدل</th></tr>
        `;
        snap.forEach(s => {
            const r = s.val();
            if (r.accepted) return;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${r.name}</td>
                <td>${r.exam}</td>
                <td>${r.score}</td>
            `;
            table.appendChild(row);
        });
    });
}

function loadMinScores() {
    db.ref("min_scores").on("value", snap => {
        const table = document.getElementById("minTable");
        table.innerHTML = `
            <tr><th>التخصص</th><th>عام</th><th>موازي</th><th>صحة</th></tr>
        `;
        const data = snap.val() || {};
        specialties.forEach(spec => {
            const m = data[spec] || { عام: "—", موازي: "—", صحة: "—" };
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${spec}</td>
                <td>${m.عام}</td>
                <td>${m.موازي}</td>
                <td>${m.صحة}</td>
            `;
            table.appendChild(row);
        });
    });
}

async function runAcceptance() {

    console.clear();
    console.log("🚀 بدء عملية القبول…");

    const seatsSnap = await db.ref("seats").once("value");
    const seats = seatsSnap.val() || {};

    const studentsSnap = await db.ref("students").once("value");
    const students = [];
    studentsSnap.forEach(s => students.push(s.val()));

    // تحويل المعدل إلى رقم
    students.forEach(s => s.score = Number(s.score));

    // ترتيب الطلاب
    students.sort((a, b) => b.score - a.score);

    const results = {};
    const minScores = {};

    for (const st of students) {

        const examKey = String(st.exam); // 🔥 أهم إصلاح

        let assigned = false;

        for (let i = 1; i <= 10; i++) {

            const choice = st.choices?.[i];
            if (!choice) continue;

            const spec = choice.specialty;
            const type = choice.type;
            const seatKey = typeMap(type);

            if (!spec || !seatKey) continue;
            if (!seats[spec]) continue;
            if (seats[spec][seatKey] === undefined) continue;

            if (seats[spec][seatKey] > 0) {

                seats[spec][seatKey]--;

                results[examKey] = {
                    accepted: true,
                    name: st.name,
                    exam: st.exam,
                    score: st.score,
                    specialty: spec,
                    type: type,
                    choiceNumber: i
                };

                if (!minScores[spec])
                    minScores[spec] = { عام: "—", موازي: "—", صحة: "—" };

                const currentMin = minScores[spec][seatKey];
                if (currentMin === "—" || st.score < currentMin)
                    minScores[spec][seatKey] = st.score;

                assigned = true;
                break;
            }
        }

        if (!assigned) {
            results[examKey] = {
                accepted: false,
                name: st.name,
                exam: st.exam,
                score: st.score
            };
        }
    }

    await db.ref("results").set(results);
    await db.ref("min_scores").set(minScores);
    await db.ref("seats_used").set(seats);

    alert("تم تحديث النتائج بنجاح");
}
