<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نتائج الحد الأدنى</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: "Tajawal", sans-serif;
    background: #eef7fa;
    padding: 20px;
}
.container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0a6fae;
    margin-bottom: 25px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    border: 1px solid #cfe3e6;
    padding: 10px;
    text-align: center;
}
th {
    background: #dff3f6;
    color: #0a6fae;
}
tr:nth-child(even) td {
    background: #f7fcfd;
}
</style>
</head>

<body>

<div class="container">

    <h1>الحد الأدنى للتخصصات</h1>

    <table id="minTable">
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    </table>

</div>

<script>
function loadMinScores() {
    const minScores = JSON.parse(localStorage.getItem("minScores") || "{}");

    const table = document.getElementById("minTable");
    table.innerHTML = `
        <tr>
            <th>التخصص</th>
            <th>العام</th>
            <th>الموازي</th>
            <th>الصحة</th>
        </tr>
    `;

    Object.keys(minScores).forEach(spec => {
        table.innerHTML += `
            <tr>
                <td>${spec}</td>
                <td>${minScores[spec].general}</td>
                <td>${minScores[spec].parallel}</td>
                <td>${minScores[spec].health}</td>
            </tr>
        `;
    });
}

// تحديث تلقائي كل 3 ثوانٍ
setInterval(loadMinScores, 3000);

// تحميل أولي
loadMinScores();
</script>

</body>
</html>
